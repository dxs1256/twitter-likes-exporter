name: Sync Twitter Likes

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:
    inputs:
      full_sync:
        description: 'Full sync (reset and fetch all)'
        required: false
        default: 'false'
        type: choice
        options:
          - 'true'
          - 'false'

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    env:
      AUTH_TOKEN: ${{ secrets.X_AUTH_TOKEN }}
      CT0: ${{ secrets.X_CT0 }}
      USER_ID: ${{ secrets.X_USER_ID }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install tweetxvault
        run: pip install tweetxvault

      - name: Configure auth
        run: |
          mkdir -p ~/.config/tweetxvault
          cat > ~/.config/tweetxvault/config.toml << 'EOF'
          [auth]
          auth_token = "'"${AUTH_TOKEN}"'"
          ct0 = "'"${CT0}"'"
          user_id = "'"${USER_ID}"'"
          EOF

      - name: Sync likes
        run: |
          if [ "${{ github.event.inputs.full_sync }}" = "true" ]; then
            tweetxvault sync likes --full --skip-enrich --skip-articles --skip-media --skip-unfurl --skip-threads
          else
            tweetxvault sync likes --skip-enrich --skip-articles --skip-media --skip-unfurl --skip-threads
          fi

      - name: Export to JSON
        run: tweetxvault export --collection likes --out exports/likes.json

      - name: Extract links
        run: python scripts/extract_links.py exports/likes.json > exports/likes_links.txt

      - name: Commit and push
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add exports/
          git diff --staged --quiet || git commit -m "chore: update likes export"
          git push
