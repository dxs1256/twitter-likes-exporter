name: Sync Twitter Likes

on:
  workflow_dispatch:
    inputs:
      full_sync:
        description: 'Full sync (reset and fetch all)'
        required: false
        default: 'false'
        type: choice
        options:
          - 'true'
          - 'false'

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    env:
      AUTH_TOKEN: ${{ secrets.X_AUTH_TOKEN }}
      CT0: ${{ secrets.X_CT0 }}
      USER_ID: ${{ secrets.X_USER_ID }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install tweetxvault
        run: pip install tweetxvault

      - name: Configure auth
        run: python scripts/configure_auth.py

      - name: Sync likes
        run: |
          if [ "${{ github.event.inputs.full_sync }}" = "true" ]; then
            tweetxvault sync likes --full --skip-enrich --skip-articles --skip-media --skip-unfurl --skip-threads
          else
            tweetxvault sync likes --skip-enrich --skip-articles --skip-media --skip-unfurl --skip-threads
          fi

      - name: Process and Export
        run: |
          # 1. Export full archive to a temporary file
          tweetxvault export json --collection likes --out /tmp/full_archive.json
          
          # 2. Generate minimal JSON and links list
          python scripts/extract_minimal.py /tmp/full_archive.json exports/likes_minimal.json
          python scripts/extract_links.py /tmp/full_archive.json > exports/likes_links.txt
          
          # 3. Clean up the large temporary file
          rm -f /tmp/full_archive.json

      - name: Commit and push
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add exports/
          git diff --staged --quiet || git commit -m "chore: update likes export"
          git push
